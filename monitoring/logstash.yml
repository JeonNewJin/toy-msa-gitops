apiVersion: v1
kind: ConfigMap
metadata:
  name: logstash-config
  namespace: toy-msa
data:
  logstash.conf: |
    input {
      tcp {
        port => 5044
        codec => json_lines
      }
    }

    filter {
      if ![service] {
        mutate {
          add_field => { "service" => "unknown" }
        }
      }
    }

    output {
      elasticsearch {
        hosts => ["http://elasticsearch:9200"]
        index => "%{[service]}-logs-%{+YYYY.MM.dd}"
      }

      stdout { codec => rubydebug }
    }

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: logstash
  namespace: toy-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: logstash
  template:
    metadata:
      labels:
        app: logstash
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: curlimages/curl:latest
          command: ['sh', '-c', 'until curl -sf http://elasticsearch:9200/_cluster/health; do echo waiting for elasticsearch; sleep 5; done']
      containers:
        - name: logstash
          image: docker.elastic.co/logstash/logstash:9.1.0
          ports:
            - containerPort: 5044
          env:
            - name: LS_JAVA_OPTS
              value: "-Xms256m -Xmx256m"
          volumeMounts:
            - name: config
              mountPath: /usr/share/logstash/pipeline/logstash.conf
              subPath: logstash.conf
      volumes:
        - name: config
          configMap:
            name: logstash-config

---

apiVersion: v1
kind: Service
metadata:
  name: logstash
  namespace: toy-msa
spec:
  type: ClusterIP
  selector:
    app: logstash
  ports:
    - port: 5044
      targetPort: 5044

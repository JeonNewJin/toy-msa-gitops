apiVersion: apps/v1
kind: Deployment
metadata:
  name: kibana
  namespace: toy-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kibana
  template:
    metadata:
      labels:
        app: kibana
    spec:
      initContainers:
        - name: wait-for-elasticsearch
          image: curlimages/curl:latest
          command: ['sh', '-c', 'until curl -sf http://elasticsearch:9200/_cluster/health?wait_for_status=yellow; do echo waiting for elasticsearch; sleep 5; done']
      containers:
        - name: kibana
          image: docker.elastic.co/kibana/kibana:9.1.0
          ports:
            - containerPort: 5601
          env:
            - name: ELASTICSEARCH_HOSTS
              value: http://elasticsearch:9200

---

apiVersion: v1
kind: Service
metadata:
  name: kibana
  namespace: toy-msa
spec:
  type: NodePort
  selector:
    app: kibana
  ports:
    - port: 5601
      targetPort: 5601
      nodePort: 30601

apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: toy-msa
data:
  prometheus.yml: |
    global:
      scrape_interval: 5s

    scrape_configs:
      - job_name: 'apigateway-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: [ 'apigateway-service:8081' ]
      - job_name: 'user-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: [ 'user-service:8081' ]
      - job_name: 'order-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: [ 'order-service:8081' ]
      - job_name: 'catalog-service'
        metrics_path: '/actuator/prometheus'
        static_configs:
          - targets: [ 'catalog-service:8081' ]

---

apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: toy-msa
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus/prometheus.yml
              subPath: prometheus.yml
      volumes:
        - name: config
          configMap:
            name: prometheus-config

---

apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: toy-msa
spec:
  type: NodePort
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      nodePort: 30090

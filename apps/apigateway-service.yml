apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway-service
  namespace: toy-msa
spec:
  replicas: 1
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: apigateway-service
  template:
    metadata:
      labels:
        app: apigateway-service
    spec:
      serviceAccountName: apigateway-service
      containers:
        - name: apigateway-service
          image: ghcr.io/jeonnewjin/toy-msa/apigateway-service:3048a6af36815987f5951e42b7afea8384ce8e12
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
            - name: management
              containerPort: 8081
          envFrom:
            - configMapRef:
                name: common-env
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: prd
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8081
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8081
            initialDelaySeconds: 30
            periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: apigateway-service
  namespace: toy-msa
spec:
  type: NodePort
  selector:
    app: apigateway-service
  ports:
    - name: http
      port: 8000
      targetPort: 8000
      nodePort: 30000
    - name: management
      port: 8081
      targetPort: 8081

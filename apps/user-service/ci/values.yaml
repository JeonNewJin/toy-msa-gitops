replicaCount: 1

image:
  repository: ghcr.io/jeonnewjin/toy-msa/user-service
  pullPolicy: Always
  tag: "b9dec9e865727fa8600f47533cf2bc4436dde6ff"

imagePullSecrets:
  - name: ghcr-secret

nameOverride: ""
fullnameOverride: ""

configMap:
  enabled: true
  data:
    SPRING_PROFILES_ACTIVE: prd
    SERVER_PORT: "8080"
    MANAGEMENT_SERVER_PORT: "8081"
    ZIPKIN_ENDPOINT: http://zipkin:9411/api/v2/spans
    LOGSTASH_HOST: logstash
    LOGSTASH_PORT: "5044"
    MYSQL_HOST: mysql
    MYSQL_PORT: "3306"
    MYSQL_USER: application
    MYSQL_PWD: application
    JWT_SECRET: ef3c624796ba503c2f44152e89b643db951fa5101bc711a7690bae2f80272790
    JWT_EXPIRATION: "86400000"

pdb:
  enabled: false
  minAvailable: 1

metrics:
  enabled: false
  path: /actuator/prometheus

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 2000
  fsGroup: 3000

securityContext:
  allowPrivilegeEscalation: false
  privileged: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: false

service:
  type: ClusterIP
  port: 8080
  managementPort: 8081

ingress:
  enabled: true
  className: traefik
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: toy-msa-strip-user-service@kubernetescrd
  hosts:
    - host: 168.107.30.129.nip.io
      paths:
        - path: /user-service
          pathType: Prefix
  tls: []
  stripPrefix: /user-service

httpRoute:
  enabled: false
  annotations: {}
  parentRefs:
    - name: gateway
      sectionName: http
  hostnames: []
  rules: []

resources: {}

probes:
  liveness:
    enabled: true
    config:
      httpGet:
        path: /actuator/health/liveness
        port: 8081
      initialDelaySeconds: 30
      periodSeconds: 15
  readiness:
    enabled: true
    config:
      httpGet:
        path: /actuator/health/readiness
        port: 8081
      initialDelaySeconds: 20
      periodSeconds: 10

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80

pvc:
  enabled: false
  accessModes:
    - ReadWriteOnce
  storageClassName: "local-path"
  capacity: "1Gi"

volumes: []
volumeMounts: []

nodeSelector: {}
tolerations: []
affinity: {}

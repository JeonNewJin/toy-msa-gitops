apiVersion: ps.percona.com/v1
kind: PerconaServerMySQL
metadata:
  name: mysql
  namespace: toy-msa
spec:
  secretsName: mysql-credentials
  unsafeFlags:
    mysqlSize: true
    proxySize: true
  mysql:
    clusterType: group-replication
    size: 2
    image: percona/percona-server:8.4.6-6.1
  proxy:
    haproxy:
      enabled: false
    router:
      enabled: true
      size: 1

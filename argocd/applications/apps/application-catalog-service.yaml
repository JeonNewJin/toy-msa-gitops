apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-catalog-service
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/JeonNewJin/toy-msa-gitops.git
    targetRevision: main
    path: apps/catalog-service
    helm:
      valueFiles:
        - values-prd.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

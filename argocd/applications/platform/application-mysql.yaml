apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: infra-mysql
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mysql
    targetRevision: 11.1.20
    helm:
      releaseName: mysql
      values: |
        image:
          registry: docker.io
          repository: bitnamilegacy/mysql
          tag: 8.4.3-debian-12-r0
        auth:
          rootPassword: root
          username: application
          password: application
          database: ecommerce
        primary:
          persistence:
            size: 5Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

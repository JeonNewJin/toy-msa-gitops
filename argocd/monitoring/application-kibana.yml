apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-kibana
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://helm.elastic.co
    chart: kibana
    targetRevision: 8.5.x
    helm:
      releaseName: kibana
      values: |
        elasticsearchHosts: "http://elasticsearch-master:9200"
        service:
          type: NodePort
          nodePort: 30601

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-kibana
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kibana
    targetRevision: 12.1.10
    helm:
      releaseName: kibana
      values: |
        image:
          registry: docker.io
          repository: bitnamilegacy/kibana
        elasticsearch:
          hosts:
            - elasticsearch
          port: 9200
          security:
            auth:
              enabled: false
          tls:
            enabled: false
        startupProbe:
          enabled: true
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 30
        readinessProbe:
          enabled: true
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 12
        livenessProbe:
          enabled: true
          initialDelaySeconds: 120
          periodSeconds: 10
          timeoutSeconds: 10
          failureThreshold: 12
        service:
          type: NodePort
          nodePorts:
            http: 30601

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
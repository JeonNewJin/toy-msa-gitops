apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-elasticsearch
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://helm.elastic.co
    chart: elasticsearch
    targetRevision: 8.5.1
    helm:
      releaseName: elasticsearch
      values: |
        replicas: 1
        minimumMasterNodes: 1
        protocol: http
        createCert: false
        esJavaOpts: "-Xms512m -Xmx512m"
        clusterHealthCheckParams: "wait_for_status=yellow&timeout=60s"
        readinessProbe:
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 10
          successThreshold: 1
          failureThreshold: 12
        esConfig:
          elasticsearch.yml: |
            xpack.security.enabled: false
            xpack.security.http.ssl.enabled: false
        service:
          type: NodePort
          nodePort: 30200
        volumeClaimTemplate:
          resources:
            requests:
              storage: 5Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
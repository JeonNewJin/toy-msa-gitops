apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-elasticsearch
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: elasticsearch
    targetRevision: 22.1.6
    helm:
      releaseName: elasticsearch
      values: |
        fullnameOverride: elasticsearch
        image:
          registry: docker.io
          repository: bitnamilegacy/elasticsearch
        sysctlImage:
          registry: docker.io
          repository: bitnamilegacy/os-shell
        volumePermissions:
          image:
            registry: docker.io
            repository: bitnamilegacy/os-shell
        global:
          kibanaEnabled: false
        security:
          enabled: false
          tls:
            restEncryption: false
            autoGenerated: false
        master:
          masterOnly: false
          replicaCount: 1
        data:
          replicaCount: 0
        coordinating:
          replicaCount: 0
        ingest:
          enabled: false
        service:
          type: NodePort
          nodePorts:
            restAPI: 30200

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
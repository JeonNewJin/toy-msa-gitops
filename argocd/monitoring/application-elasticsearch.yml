apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-elasticsearch
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: elasticsearch
    targetRevision: 22.1.6
    helm:
      releaseName: elasticsearch
      values: |
        fullnameOverride: elasticsearch
        global:
          kibanaEnabled: false
        security:
          enabled: false
          tls:
            restEncryption: false
            autoGenerated: false
        master:
          masterOnly: false
          replicaCount: 1
          heapSize: 512m
          readinessProbe:
            initialDelaySeconds: 120
          livenessProbe:
            initialDelaySeconds: 180
          persistence:
            enabled: true
            size: 5Gi
        data:
          replicaCount: 0
        service:
          type: NodePort
          nodePorts:
            restAPI: 30200

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
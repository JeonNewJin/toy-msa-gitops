apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-mysql
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mysql
    targetRevision: 11.1.20
    helm:
      releaseName: mysql
      values: |
        auth:
          rootPassword: root
          username: application
          password: application
          database: ecommerce
        primary:
          persistence:
            size: 5Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
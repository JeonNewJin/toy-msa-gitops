apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-mysql
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: mysql
    targetRevision: 11.x.x
    helm:
      releaseName: mysql
      values: |
        global:
          imagePullSecrets:
            - name: ghcr-secret
        image:
          registry: ghcr.io
        auth:
          rootPassword: root
          username: application
          password: application
          database: ecommerce
        primary:
          persistence:
            size: 5Gi

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

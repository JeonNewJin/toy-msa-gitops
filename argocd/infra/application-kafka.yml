apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: toy-msa-kafka
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami
    chart: kafka
    targetRevision: 31.0.0
    helm:
      releaseName: kafka
      values: |
        image:
          registry: docker.io
          repository: bitnamilegacy/kafka
        controller:
          replicaCount: 1
          controllerOnly: false
        broker:
          replicaCount: 0
        kraft:
          clusterId: "MkU3OEVBNTcwNTJENDM2Qk"
        listeners:
          client:
            protocol: PLAINTEXT
          controller:
            protocol: PLAINTEXT
          interbroker:
            protocol: PLAINTEXT
        persistence:
          enabled: true
          size: 5Gi
        extraConfig: |
          offsets.topic.replication.factor=1
          transaction.state.log.replication.factor=1
          transaction.state.log.min.isr=1
          default.replication.factor=1
          min.insync.replicas=1

  destination:
    server: https://kubernetes.default.svc
    namespace: toy-msa

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
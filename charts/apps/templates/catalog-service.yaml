apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.catalogService.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: catalog-service
  template:
    metadata:
      labels:
        app: catalog-service
    spec:
      serviceAccountName: catalog-service
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      containers:
        - name: catalog-service
          image: {{ .Values.global.imageRegistry }}/catalog-service:{{ .Values.global.imageTag }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.catalogService.port.http }}
            - name: management
              containerPort: {{ .Values.catalogService.port.management }}
            - name: grpc
              containerPort: {{ .Values.catalogService.port.grpc }}
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.springProfile }}
            - name: SERVER_PORT
              value: {{ .Values.catalogService.port.http | quote }}
            - name: MANAGEMENT_SERVER_PORT
              value: {{ .Values.catalogService.port.management | quote }}
            - name: ZIPKIN_ENDPOINT
              value: {{ .Values.zipkin.endpoint }}
            - name: LOGSTASH_HOST
              value: {{ .Values.logstash.host }}
            - name: LOGSTASH_PORT
              value: {{ .Values.logstash.port | quote }}
            - name: MYSQL_HOST
              value: {{ .Values.catalogService.mysql.host }}
            - name: MYSQL_PORT
              value: {{ .Values.catalogService.mysql.port | quote }}
            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: mysql-username
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: mysql-password
            - name: BOOTSTRAP_SERVERS
              value: {{ .Values.catalogService.kafka.bootstrapServers }}
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.catalogService.port.management }}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.catalogService.port.management }}
            initialDelaySeconds: 30
            periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: catalog-service
  namespace: {{ .Values.namespace }}
spec:
  type: ClusterIP
  selector:
    app: catalog-service
  ports:
    - name: http
      port: {{ .Values.catalogService.port.http }}
      targetPort: {{ .Values.catalogService.port.http }}
    - name: management
      port: {{ .Values.catalogService.port.management }}
      targetPort: {{ .Values.catalogService.port.management }}
    - name: grpc
      port: {{ .Values.catalogService.port.grpc }}
      targetPort: {{ .Values.catalogService.port.grpc }}

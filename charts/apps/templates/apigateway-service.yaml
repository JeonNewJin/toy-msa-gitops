apiVersion: apps/v1
kind: Deployment
metadata:
  name: apigateway-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.apigatewayService.replicas }}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: apigateway-service
  template:
    metadata:
      labels:
        app: apigateway-service
    spec:
      serviceAccountName: apigateway-service
      imagePullSecrets:
        {{- toYaml .Values.global.imagePullSecrets | nindent 8 }}
      containers:
        - name: apigateway-service
          image: {{ .Values.global.imageRegistry }}/apigateway-service:{{ .Values.global.imageTag }}
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: {{ .Values.apigatewayService.port.http }}
            - name: management
              containerPort: {{ .Values.apigatewayService.port.management }}
          envFrom:
            - configMapRef:
                name: common-env
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: {{ .Values.global.springProfile }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: jwt-secret
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: {{ .Values.apigatewayService.port.management }}
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: {{ .Values.apigatewayService.port.management }}
            initialDelaySeconds: 30
            periodSeconds: 15

---

apiVersion: v1
kind: Service
metadata:
  name: apigateway-service
  namespace: {{ .Values.namespace }}
spec:
  type: {{ .Values.apigatewayService.service.type }}
  selector:
    app: apigateway-service
  ports:
    - name: http
      port: {{ .Values.apigatewayService.port.http }}
      targetPort: {{ .Values.apigatewayService.port.http }}
      {{- if eq .Values.apigatewayService.service.type "NodePort" }}
      nodePort: {{ .Values.apigatewayService.service.nodePort }}
      {{- end }}
    - name: management
      port: {{ .Values.apigatewayService.port.management }}
      targetPort: {{ .Values.apigatewayService.port.management }}
